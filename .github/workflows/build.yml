name: Build ESP32 Firmware

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/setup-esp-idf@v1
        with:
          esp-idf-version: "v5.1"
          target: "esp32"

      - name: Build project
        run: |
          idf.py build

      - name: Upload bin firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
